name: Pytest CI

on:
  push:
    branches: [ main ]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install pytest
        pip install pytest-html
        pip install pandas
        pip install openpyxl

    - name: Run tests
      run: |
        pytest -v